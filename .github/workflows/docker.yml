name: docker

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  pull_request:
    branches: [main]
    paths: [Dockerfile]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: skillful-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Inspect image
        run: |
          docker image inspect skillful-mcp:test --format 'arch={{.Architecture}} os={{.Os}}'
          docker create --name test-inspect skillful-mcp:test || true
          docker cp test-inspect:/bin/skillful-mcp /tmp/skillful-mcp || true
          file /tmp/skillful-mcp || true
          docker rm test-inspect || true
      - name: Verify container runs
        run: |
          output=$(docker run --rm skillful-mcp:test --version 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q '[0-9]\.[0-9]\.[0-9]'
